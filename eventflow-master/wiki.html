<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2O KnowledgeBase</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f2ec; --bg2:#eee9e0; --surface:#ffffff; --surface2:#faf8f4; --border:#d8d0c4; --border2:#c9bfb0; --text:#1a1713; --text2:#4a4540; --text3:#7a726a; --accent:#c0392b; --accent2:#e74c3c; --accent-light:#fde8e6; --gold:#c89b3c; --gold-light:#fdf3de; --green:#27ae60; --shadow:0 2px 8px rgba(0,0,0,0.08); --shadow2:0 4px 20px rgba(0,0,0,0.12); --radius:14px; --radius2:10px; --radius3:8px; --font-display:'DM Serif Display', serif; --font-body:'DM Sans', sans-serif;
}
[data-theme="dark"]{--bg:#0f0e0c;--bg2:#161411;--surface:#1e1b17;--surface2:#252118;--border:#2e2a24;--border2:#3a342c;--text:#f0ebe3;--text2:#b8b0a4;--text3:#7a726a;--accent:#e74c3c;--accent-light:#2a1210;--gold:#d4a94a;--gold-light:#1e1808;--shadow:0 2px 8px rgba(0,0,0,0.35);--shadow2:0 4px 20px rgba(0,0,0,0.45);} 
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;} body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;} a{color:inherit;text-decoration:none;} button,input,textarea,select{font:inherit;} .container{max-width:1200px;margin:0 auto;padding:24px;} header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;} .brand{display:flex;align-items:center;gap:10px;} .brand-icon{width:42px;height:42px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-size:18px;} .brand h1{font-family:var(--font-display);font-size:24px;} .brand h1 span{color:var(--accent);} .nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;} .nav a,.nav button{padding:8px 12px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;} .nav a:hover,.nav button:hover{background:var(--accent);color:white;border-color:var(--accent);} .hero{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;display:grid;grid-template-columns:1.2fr 0.8fr;gap:20px;align-items:center;margin-bottom:20px;} .hero h2{font-size:28px;font-family:var(--font-display);margin-bottom:8px;} .hero p{color:var(--text2);font-size:15px;max-width:680px;} .hero-card{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius2);padding:16px;} .hero-card strong{display:block;margin-bottom:6px;} .layout{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;} .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;} .panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px;} .panel-body{padding:16px;} .form-group{margin-bottom:12px;} label{display:block;margin-bottom:6px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text2);letter-spacing:.5px;} input,textarea,select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius3);background:var(--bg2);color:var(--text);outline:none;} input:focus,textarea:focus,select:focus{border-color:var(--accent);background:var(--surface);} textarea{min-height:120px;resize:vertical;} .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border:none;border-radius:var(--radius3);font-weight:700;cursor:pointer;background:var(--accent);color:white;} .btn.secondary{background:var(--bg2);color:var(--text2);border:1px solid var(--border);} .btn:hover{filter:brightness(1.05);} .search-input{margin-bottom:12px;} .article-list{display:flex;flex-direction:column;gap:10px;} .article-card{border:1px solid var(--border);background:var(--surface2);padding:12px 14px;border-radius:var(--radius2);cursor:pointer;transition:all .2s ease;} .article-card:hover{border-color:var(--accent);transform:translateY(-1px);} .article-card h3{font-size:16px;margin-bottom:6px;} .article-meta{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;} .article-content{white-space:pre-wrap;font-size:14px;color:var(--text2);} .empty-state{text-align:center;padding:28px 12px;color:var(--text3);} .pill{display:inline-block;padding:4px 8px;border-radius:999px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;margin-top:6px;} .hidden{display:none;} @media (max-width:900px){.hero{grid-template-columns:1fr;}.layout{grid-template-columns:1fr;}} </style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <img src="logo.png" alt="H2O Wiki Logo" class="brand-logo-img" style="width:72px;height:72px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
      <div>
        <h1>H<span>2</span>O <span>Wiki</span></h1>
      </div>
    </div>
    <div class="nav">
      <a href="event-manager.html">← Înapoi la evenimente</a>
      <button id="themeToggle" type="button">🌙/☀️</button>
    </div>
  </header>

  <section class="hero">
    <div style="text-align:center;width:100%;">
      <h2>Centru de ajutor pentru utilizatori</h2>
      <p>Aici va fi publicat suportul, instrucțiunile și răspunsurile importante.</p>
    </div>
  </section>

  <div class="layout">
    <aside class="panel">
      <div class="panel-header">🔎 Caută în Wiki</div>
      <div class="panel-body">
        <input id="wikiSearch" class="search-input" type="text" placeholder="Caută articol...">
        <div id="articleList" class="article-list"></div>
      </div>
    </aside>

    <main class="panel">
      <div class="panel-header">🧾 Detaliu articol</div>
      <div class="panel-body">
        <div id="adminFormWrap" class="hidden">
          <form id="wikiForm">
            <input type="hidden" id="articleId">
            <div class="form-group">
              <label for="articleTitle">Titlu</label>
              <input id="articleTitle" required>
            </div>
            <div class="form-group">
              <label for="articleCategory">Categorie</label>
              <input id="articleCategory" placeholder="General / Login / Evenimente">
            </div>
            <div class="form-group">
              <label for="articleIcon">Icon</label>
              <input id="articleIcon" value="📄">
            </div>
            <div class="form-group">
              <label for="articleContent">Conținut</label>
              <textarea id="articleContent" required></textarea>
            </div>
            <div class="btn-row" style="display:flex;gap:10px;flex-wrap:wrap;">
              <button class="btn" type="submit">💾 Salvează articol</button>
              <button class="btn secondary" id="cancelEdit" type="button">Renunță</button>
            </div>
          </form>
        </div>

        <div id="articleDetail">
          <div class="empty-state">Selectează un articol pentru a-l citi.</div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="auth.js"></script>
<script>
const WIKI_API = '../eventflow_backend-master/backend/wiki.php';
let articles = [];
let selectedId = null;

function escapeHtml(value) {
  return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderList() {
  const search = document.getElementById('wikiSearch').value.toLowerCase();
  const filtered = articles.filter(a => [a.title, a.category, a.content].join(' ').toLowerCase().includes(search));
  const list = document.getElementById('articleList');
  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">Niciun articol găsit.</div>';
    return;
  }
  filtered.forEach(article => {
    const div = document.createElement('div');
    div.className = 'article-card';
    div.innerHTML = `<h3>${escapeHtml(article.title)}</h3><div style="color:var(--text2);font-size:13px;">${escapeHtml(article.category || 'General')}</div><div class="article-meta">${escapeHtml(article.icon || '📄')} · ${new Date(article.created_at).toLocaleDateString('ro-RO')}</div>`;
    div.addEventListener('click', () => showArticle(article.id));
    list.appendChild(div);
  });
}

function renderDetail(article) {
  const detail = document.getElementById('articleDetail');
  if (!article) {
    detail.innerHTML = '<div class="empty-state">Selectează un articol pentru a-l citi.</div>';
    return;
  }
  detail.innerHTML = `
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:10px;">
      <div>
        <div class="pill">${escapeHtml(article.category || 'General')}</div>
        <h2 style="font-family:var(--font-display);font-size:24px;margin-top:8px;">${escapeHtml(article.title)}</h2>
      </div>
      ${isAdmin() ? `<div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn secondary" id="editArticleBtn" type="button">✏️ Editează</button><button class="btn secondary" id="deleteArticleBtn" type="button">🗑️ Șterge</button></div>` : ''}
    </div>
    <div class="article-content">${escapeHtml(article.content || '')}</div>
  `;
  if (isAdmin()) {
    document.getElementById('editArticleBtn').addEventListener('click', () => openEditor(article));
    document.getElementById('deleteArticleBtn').addEventListener('click', async () => {
      if (!confirm('Ștergi acest articol?')) return;
      await fetch(`${WIKI_API}?id=${article.id}`, { credentials: 'include', method: 'DELETE' });
      await loadArticles();
    });
  }
}

function showArticle(id) {
  const article = articles.find(a => a.id === id);
  selectedId = id;
  renderDetail(article);
}

function openEditor(article) {
  document.getElementById('adminFormWrap').classList.remove('hidden');
  document.getElementById('articleId').value = article?.id || '';
  document.getElementById('articleTitle').value = article?.title || '';
  document.getElementById('articleCategory').value = article?.category || '';
  document.getElementById('articleIcon').value = article?.icon || '📄';
  document.getElementById('articleContent').value = article?.content || '';
}

function closeEditor() {
  document.getElementById('adminFormWrap').classList.add('hidden');
  document.getElementById('wikiForm').reset();
  document.getElementById('articleId').value = '';
}

async function loadArticles() {
  try {
    const response = await fetch(WIKI_API, { credentials: 'include' });
    const data = await response.json();
    articles = Array.isArray(data.articles) ? data.articles : [];
    renderList();
    if (!selectedId && articles[0]) {
      showArticle(articles[0].id);
    } else if (selectedId) {
      showArticle(selectedId);
    }
    updateAdminAccess();
  } catch (e) {
    articles = [];
    renderList();
    document.getElementById('articleDetail').innerHTML = '<div class="empty-state">Nu s-a putut încărca wiki-ul.</div>';
  }
}

function updateAdminAccess() {
  const formWrap = document.getElementById('adminFormWrap');
  if (formWrap) formWrap.classList.toggle('hidden', !isAdmin());
}

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('wikiSearch').addEventListener('input', renderList);
  document.getElementById('wikiForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!isAdmin()) return;
    const payload = {
      title: document.getElementById('articleTitle').value.trim(),
      category: document.getElementById('articleCategory').value.trim(),
      icon: document.getElementById('articleIcon').value.trim() || '📄',
      content: document.getElementById('articleContent').value.trim(),
      is_published: 1
    };
    const id = document.getElementById('articleId').value;
    const method = id ? 'PUT' : 'POST';
    const url = id ? `${WIKI_API}?id=${encodeURIComponent(id)}` : WIKI_API;
    await fetch(url, { credentials: 'include', method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    closeEditor();
    await loadArticles();
  });
  document.getElementById('cancelEdit').addEventListener('click', closeEditor);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = document.documentElement.dataset.theme === 'dark';
    document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
    localStorage.setItem('ef_theme', isDark ? 'light' : 'dark');
  });
  document.documentElement.dataset.theme = localStorage.getItem('ef_theme') || 'light';
  await loadArticles();
});
</script>

<style>
footer { background: var(--surface); border-top: 1px solid var(--border); padding: 16px 0; margin-top: 30px; }
.footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
.footer-text { font-size: 12px; color: var(--text3); }
.footer-text a { color: var(--accent); text-decoration: none; font-weight: 500; }
</style>

<footer>
  <div class="footer-inner">
    <div class="footer-text">
      © Ursu Nicoleta&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="event-manager.html">EventManager</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;WikiPage
    </div>
  </div>
</footer>

</body>
</html>
